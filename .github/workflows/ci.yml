name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check
        env:
          ASTRO_DISABLE_GITHUB_ACTIONS_CHECK: true

      - name: Build
        run: npm run build
        env:
          ASTRO_DISABLE_GITHUB_ACTIONS_CHECK: true
